name: MimiNenrei Production Submit

on:
  workflow_dispatch:

concurrency:
  group: miminenrei-production
  cancel-in-progress: true

jobs:
  submit-production:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          if [ -n "$XCODE_APP" ]; then
            sudo xcode-select -s "/Applications/$XCODE_APP"
          fi
          xcodebuild -version

      - name: Install tools
        run: |
          brew install xcodegen
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install pyjwt cryptography requests

      - name: Write App Store Connect key
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          test -n "$ASC_PRIVATE_KEY"
          mkdir -p /tmp/asc
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "$ASC_PRIVATE_KEY" > "/tmp/asc/AuthKey_${ASC_KEY_ID}.p8"
          cp "/tmp/asc/AuthKey_${ASC_KEY_ID}.p8" /tmp/asc_key.p8
          cp "/tmp/asc/AuthKey_${ASC_KEY_ID}.p8" "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Set build number
        run: |
          BUILD_NUM=$((GITHUB_RUN_NUMBER + 100))
          echo "BUILD_NUMBER=$BUILD_NUM" >> "$GITHUB_ENV"
          echo "Using build number $BUILD_NUM"

      - name: Archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          GAD_APPLICATION_IDENTIFIER: ${{ vars.GAD_APPLICATION_IDENTIFIER }}
          GAD_BANNER_AD_UNIT_ID: ${{ vars.GAD_BANNER_AD_UNIT_ID }}
        run: |
          xcodebuild archive \
            -project MimiNenrei.xcodeproj \
            -scheme MimiNenrei \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/MimiNenrei.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=83VGKGSQUH \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            GAD_APPLICATION_IDENTIFIER="${GAD_APPLICATION_IDENTIFIER:-ca-app-pub-3940256099942544~1458002511}" \
            GAD_BANNER_AD_UNIT_ID="${GAD_BANNER_AD_UNIT_ID:-ca-app-pub-3940256099942544/2934735716}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "/tmp/asc/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Export IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath build/MimiNenrei.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist export_options.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "/tmp/asc/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: MimiNenrei-IPA
          path: build/export/*.ipa

      - name: Upload to App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          IPA_PATH="$(find build/export -name '*.ipa' -print -quit)"
          test -n "$IPA_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Submit production review
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_P8_PATH: /tmp/asc_key.p8
          APP_BUNDLE_ID: com.tokyonasu.miminenrei
          APP_NAME: "みみ年齢"
          APP_SKU: miminenrei
          APP_VERSION: "1.0"
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
        run: |
          . .venv/bin/activate
          python scripts/submit_production.py
