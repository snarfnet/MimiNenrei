name: MimiNenrei iOS Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          if [ -n "$XCODE_APP" ]; then
            sudo xcode-select -s "/Applications/$XCODE_APP"
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for simulator
        run: |
          xcodebuild build \
            -project MimiNenrei.xcodeproj \
            -scheme MimiNenrei \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            GAD_APPLICATION_IDENTIFIER=ca-app-pub-3940256099942544~1458002511 \
            GAD_BANNER_AD_UNIT_ID=ca-app-pub-3940256099942544/2934735716
